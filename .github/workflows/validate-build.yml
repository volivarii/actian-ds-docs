name: Validate build (drift guards)

on:
  workflow_call:
  pull_request:
    paths:
      - 'vendor/**'
      - 'vendored.json'
      - 'scripts/validation/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - name: Run drift guards
        run: node scripts/validation/validate-build.cjs
