name: Vendor knowledge-repo snapshot

on:
  schedule:
    - cron: '0 11 * * *'    # 11:00 UTC daily — 2hr after plugin's snapshot
  workflow_dispatch:
    inputs:
      sha:
        description: 'Knowledge repo SHA (override; default resolves range)'
        required: false
        type: string
      range:
        description: 'Override the semver range from vendored.json'
        required: false
        type: string
  repository_dispatch:
    types: [knowledge-release]

concurrency:
  group: vendor
  cancel-in-progress: false

jobs:
  vendor:
    name: Pull knowledge-repo snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: volivarii
          repositories: actian-ds-knowledge,actian-ds-docs

      - name: Pull snapshot
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            node scripts/vendor/vendor-snapshot.cjs --sha "${{ inputs.sha }}"
          else
            node scripts/vendor/vendor-snapshot.cjs --range
          fi

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet vendored.json vendor/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open or update PR
        id: cpr
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: |
            vendor(knowledge): refresh to ${{ env.RESOLVED_VERSION }}
          branch: vendor/auto-refresh
          delete-branch: true
          title: "vendor(knowledge): refresh"
          body: |
            Auto-generated vendor refresh from knowledge tag.
            Review the diff under `vendor/` and `vendored.json`.
          labels: vendor,auto-merge

      - name: Enable auto-merge
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number
        env:
          # App token (not default GITHUB_TOKEN) — gh CLI auto-merge call
          # attributes to the App, matching the PR author identity.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          PR="${{ steps.cpr.outputs.pull-request-number }}"
          REPO="${{ github.repository }}"
          # main has no branch protection / required checks, so GitHub
          # refuses `gh pr merge --auto` (the PR is immediately "clean";
          # auto-merge has nothing to wait on). The old fallback squashed
          # instantly, merging vendor refreshes BEFORE the build/links/a11y
          # checks ran. Instead: if --auto is unavailable, explicitly wait
          # for the PR's checks to finish and merge only when they all pass.
          # On check failure this step fails and the PR stays open for
          # review; nothing merges silently.
          if gh pr merge "$PR" --auto --squash --repo "$REPO"; then
            echo "Auto-merge enabled; GitHub merges when required checks pass."
            exit 0
          fi
          echo "Auto-merge unavailable (no required checks on main); watching PR checks instead."
          # Check suites register a few seconds after PR creation; poll until
          # at least one check is reported so --watch has something to watch.
          for attempt in 1 2 3 4 5 6; do
            if OUT=$(gh pr checks "$PR" --repo "$REPO" 2>&1); then
              break
            fi
            if echo "$OUT" | grep -qi "no checks reported"; then
              echo "No checks registered yet (attempt $attempt); retrying in 20s..."
              sleep 20
            else
              break  # checks exist (pending or failing); proceed to watch
            fi
          done
          gh pr checks "$PR" --repo "$REPO" --watch --fail-fast
          gh pr merge "$PR" --squash --repo "$REPO"
