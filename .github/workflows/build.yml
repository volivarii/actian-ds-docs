name: Build and Deploy

# Triggers:
#   - push to main      → build + deploy to GitHub Pages
#   - pull_request      → build only (deploy gated by `if: github.ref == 'refs/heads/main'`)
#
# We intentionally do NOT trigger on `push` to PR branches: the same SHA
# already gets a `pull_request` build, so a bare `push:` trigger would
# double-build every PR commit (push event ref differs from pull_request
# event ref, so the concurrency group below cannot dedupe them either).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Drift guards
        run: node scripts/validation/validate-build.cjs

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: https://volivarii.github.io/actian-ds-docs
          SITE_BASE: /actian-ds-docs
        run: npm run build

      # npm test runs the full suite from package.json; a hand-picked subset
      # here silently skipped newer test files (e.g. remark-base-links).
      # Runs AFTER the build: some generator tests assert the generated
      # category/component pages, which prebuild produces and the vendor
      # refresh does not commit, so a fresh checkout lacks them until built.
      - name: Unit tests
        run: npm test

      # The site deploys under /actian-ds-docs, so EVERY root-absolute URL in
      # the rendered HTML (href/src attributes and redirect meta-refresh urls)
      # must carry that base or it 404s in production. The link-validator job
      # builds at SITE_BASE=/ and so cannot catch this; it must run on this
      # prod build. Replaces the earlier /media/-only grep, which missed the
      # ~160 unprefixed markdown links and redirect destinations. Scope,
      # allowlist, and rationale live in the script (also runnable locally
      # via `npm run check:base-prefix`).
      - name: Assert all root-absolute URLs are base-prefixed
        env:
          SITE_BASE: /actian-ds-docs
        run: npm run check:base-prefix

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  a11y:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      # DETECT_CHROMEDRIVER_VERSION makes the chromedriver postinstall download
      # the driver matching the Chrome actually installed on the runner, instead
      # of the version frozen in package-lock.json.
      #
      # Without it this job breaks every time the runner image bumps Chrome:
      # the lockfile pinned chromedriver 148, ubuntu-latest moved to Chrome 150,
      # and axe died with "This version of ChromeDriver only supports Chrome
      # version 148". Red since 2026-07-09, which also blocked `deploy` (it
      # needs build+links+a11y). Pinning Chrome instead would just move the
      # breakage to the next bump and test an ever-staler browser.
      - name: Install deps (chromedriver matched to the runner's Chrome)
        env:
          DETECT_CHROMEDRIVER_VERSION: "true"
        run: npm ci

      # Build with SITE_BASE=/ so the local http-server serving dist/ at
      # root URL aligns with the generated link paths. (Production uses
      # SITE_BASE=/actian-ds-docs; here we test the rendered HTML against
      # axe, not the production URL shape.)
      - name: Build site for a11y scan
        env:
          SITE_URL: http://localhost:4321
          SITE_BASE: /
        run: npm run build

      # Background processes don't survive across GitHub Actions steps —
      # each `run:` spawns a fresh shell, killing the server. Server start
      # + wait + axe sweep must all live in one `run:` block.
      - name: Serve dist + run axe against target pages
        run: |
          set -e
          npx http-server dist -p 4321 -s &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          npx wait-on http://localhost:4321/ --timeout 30000
          for path in "/" "/components/action/button/" "/foundations/spacing/" "/accessibility/"; do
            echo "axe → $path"
            # Exclusions: Starlight default chrome we don't own (theme
            # toggle, prev/next pagination). Track these upstream rather
            # than overriding Starlight's CSS.
            npx axe "http://localhost:4321${path}" \
              --rules "color-contrast,landmark-one-main,page-has-heading-one,region,duplicate-id-aria" \
              --exclude "[data-astro-source-file],.toggle,a[rel='prev'],a[rel='next']" \
              --exit
          done

  links:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Run links validator
        run: npm run build:check

  # Deploy must live in the same workflow as the artifact upload — the
  # deploy-pages action reads artifacts from the current workflow run,
  # and workflow_run-triggered deploys can't see upstream artifacts.
  # Gated on ALL verification jobs (build, links, a11y): previously it only
  # needed `build`, so a red links or a11y job still shipped to production.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [build, links, a11y]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # Pages deploys occasionally fail transiently (API 5xx / artifact
      # propagation). One retry before failing the run for real.
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      - uses: actions/deploy-pages@v4
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'

  # Make failure reach a human.
  #
  # main was red from 2026-07-09 to 2026-07-12 and the site silently stopped
  # deploying for three days. Nobody knew, because nothing said so: `deploy` is
  # gated on build+links+a11y, so when a11y broke (a ChromeDriver/Chrome version
  # drift, nothing to do with our code) the pipeline just... stopped shipping.
  # Meanwhile the nightly vendor PRs kept auto-merging into that red main, which
  # made the repo look busy and healthy.
  #
  # GitHub emails the actor who triggered a failed run. These runs are triggered
  # by a bot on a schedule, so that email goes nowhere. This turns a red main
  # into ONE tracking issue (not one per push) that auto-closes when main is
  # green again. Same self-managing pattern as the knowledge repo's
  # sync-failure issue.
  notify-red-main:
    # always(): this must run even though the jobs it watches failed.
    if: always() && github.ref == 'refs/heads/main'
    needs: [build, links, a11y, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update the red-main issue
        if: contains(needs.*.result, 'failure')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD: ${{ needs.build.result }}
          LINKS: ${{ needs.links.result }}
          A11Y: ${{ needs.a11y.result }}
          DEPLOY: ${{ needs.deploy.result }}
        # Best-effort: a notification hiccup must never be the thing that fails.
        run: |
          gh label create red-main --color B60205 --description "main is red; the site is not deploying" 2>/dev/null || true
          note="Run: $RUN_URL"$'\n\n'"| job | result |"$'\n'"|---|---|"$'\n'"| build | \`$BUILD\` |"$'\n'"| links | \`$LINKS\` |"$'\n'"| a11y | \`$A11Y\` |"$'\n'"| deploy | \`$DEPLOY\` |"
          existing=$(gh issue list --state open --label red-main --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still red on $(git rev-parse --short HEAD 2>/dev/null || echo main)."$'\n\n'"$note" || true
          else
            gh issue create --title "🔴 docs main is red: the site is NOT deploying" --label red-main \
              --body "\`deploy\` is gated on build + links + a11y, so while any of them is red **nothing ships to production**."$'\n\n'"$note"$'\n\n'"This issue auto-closes when main is green again." || true
          fi

      - name: Close the red-main issue when main is green again
        if: ${{ !contains(needs.*.result, 'failure') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          for n in $(gh issue list --state open --label red-main --json number --jq '.[].number' 2>/dev/null || true); do
            gh issue close "$n" --comment "✅ main is green and the site is deploying again. $RUN_URL" || true
          done
