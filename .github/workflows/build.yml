name: Build and Deploy

# Triggers:
#   - push to main      → build + deploy to GitHub Pages
#   - pull_request      → build only (deploy gated by `if: github.ref == 'refs/heads/main'`)
#
# We intentionally do NOT trigger on `push` to PR branches: the same SHA
# already gets a `pull_request` build, so a bare `push:` trigger would
# double-build every PR commit (push event ref differs from pull_request
# event ref, so the concurrency group below cannot dedupe them either).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Drift guards
        run: node scripts/validation/validate-build.cjs

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: https://volivarii.github.io/actian-ds-docs
          SITE_BASE: /actian-ds-docs
        run: npm run build

      # npm test runs the full suite from package.json; a hand-picked subset
      # here silently skipped newer test files (e.g. remark-base-links).
      # Runs AFTER the build: some generator tests assert the generated
      # category/component pages, which prebuild produces and the vendor
      # refresh does not commit, so a fresh checkout lacks them until built.
      - name: Unit tests
        run: npm test

      # The site deploys under /actian-ds-docs, so EVERY root-absolute URL in
      # the rendered HTML (href/src attributes and redirect meta-refresh urls)
      # must carry that base or it 404s in production. The link-validator job
      # builds at SITE_BASE=/ and so cannot catch this; it must run on this
      # prod build. Replaces the earlier /media/-only grep, which missed the
      # ~160 unprefixed markdown links and redirect destinations. Scope,
      # allowlist, and rationale live in the script (also runnable locally
      # via `npm run check:base-prefix`).
      - name: Assert all root-absolute URLs are base-prefixed
        env:
          SITE_BASE: /actian-ds-docs
        run: npm run check:base-prefix

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  a11y:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Build with SITE_BASE=/ so the local http-server serving dist/ at
      # root URL aligns with the generated link paths. (Production uses
      # SITE_BASE=/actian-ds-docs; here we test the rendered HTML against
      # axe, not the production URL shape.)
      - name: Build site for a11y scan
        env:
          SITE_URL: http://localhost:4321
          SITE_BASE: /
        run: npm run build

      # Background processes don't survive across GitHub Actions steps —
      # each `run:` spawns a fresh shell, killing the server. Server start
      # + wait + axe sweep must all live in one `run:` block.
      - name: Serve dist + run axe against target pages
        run: |
          set -e
          npx http-server dist -p 4321 -s &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          npx wait-on http://localhost:4321/ --timeout 30000
          for path in "/" "/components/action/button/" "/foundations/spacing/" "/accessibility/"; do
            echo "axe → $path"
            # Exclusions: Starlight default chrome we don't own (theme
            # toggle, prev/next pagination). Track these upstream rather
            # than overriding Starlight's CSS.
            npx axe "http://localhost:4321${path}" \
              --rules "color-contrast,landmark-one-main,page-has-heading-one,region,duplicate-id-aria" \
              --exclude "[data-astro-source-file],.toggle,a[rel='prev'],a[rel='next']" \
              --exit
          done

  links:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Run links validator
        run: npm run build:check

  # Deploy must live in the same workflow as the artifact upload — the
  # deploy-pages action reads artifacts from the current workflow run,
  # and workflow_run-triggered deploys can't see upstream artifacts.
  # Gated on ALL verification jobs (build, links, a11y): previously it only
  # needed `build`, so a red links or a11y job still shipped to production.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [build, links, a11y]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # Pages deploys occasionally fail transiently (API 5xx / artifact
      # propagation). One retry before failing the run for real.
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      - uses: actions/deploy-pages@v4
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
