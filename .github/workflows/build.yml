name: Build and Deploy

# Triggers:
#   - push to main      → build + deploy to GitHub Pages
#   - pull_request      → build only (deploy gated by `if: github.ref == 'refs/heads/main'`)
#
# We intentionally do NOT trigger on `push` to PR branches: the same SHA
# already gets a `pull_request` build, so a bare `push:` trigger would
# double-build every PR commit (push event ref differs from pull_request
# event ref, so the concurrency group below cannot dedupe them either).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Drift guards
        run: node scripts/validation/validate-build.cjs

      - name: Unit tests
        run: |
          node --test tests/lib/paths.test.cjs
          node --test tests/lib/category-defaults-loader.test.cjs
          node --test tests/validation/validate-build.test.cjs
          node --test tests/vendor/version-range-resolution.test.cjs
          node --test tests/vendor/vendor-snapshot-core-drift.test.cjs
          node --test tests/validation/composition-manifest.test.cjs

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: https://volivarii.github.io/actian-ds-docs
          SITE_BASE: /actian-ds-docs
        run: npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  a11y:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Build with SITE_BASE=/ so the local http-server serving dist/ at
      # root URL aligns with the generated link paths. (Production uses
      # SITE_BASE=/actian-ds-docs; here we test the rendered HTML against
      # axe, not the production URL shape.)
      - name: Build site for a11y scan
        env:
          SITE_URL: http://localhost:4321
          SITE_BASE: /
        run: npm run build

      # Background processes don't survive across GitHub Actions steps —
      # each `run:` spawns a fresh shell, killing the server. Server start
      # + wait + axe sweep must all live in one `run:` block.
      - name: Serve dist + run axe against target pages
        run: |
          set -e
          npx http-server dist -p 4321 -s &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          npx wait-on http://localhost:4321/ --timeout 30000
          for path in "/" "/components/action/button/" "/foundations/spacing/" "/accessibility/"; do
            echo "axe → $path"
            # Exclusions: Starlight default chrome we don't own (theme
            # toggle, prev/next pagination). Track these upstream rather
            # than overriding Starlight's CSS.
            npx axe "http://localhost:4321${path}" \
              --rules "color-contrast,landmark-one-main,page-has-heading-one,region,duplicate-id-aria" \
              --exclude "[data-astro-source-file],.toggle,a[rel='prev'],a[rel='next']" \
              --exit
          done

  links:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Run links validator
        run: npm run build:check

  # Deploy must live in the same workflow as the artifact upload — the
  # deploy-pages action reads artifacts from the current workflow run,
  # and workflow_run-triggered deploys can't see upstream artifacts.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
