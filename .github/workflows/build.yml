name: Build and Deploy

# Triggers:
#   - push to main      → build + deploy to GitHub Pages
#   - pull_request      → build only (deploy gated by `if: github.ref == 'refs/heads/main'`)
#
# We intentionally do NOT trigger on `push` to PR branches: the same SHA
# already gets a `pull_request` build, so a bare `push:` trigger would
# double-build every PR commit (push event ref differs from pull_request
# event ref, so the concurrency group below cannot dedupe them either).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Drift guards
        run: node scripts/validation/validate-build.cjs

      - name: Unit tests
        run: |
          node --test tests/lib/paths.test.cjs
          node --test tests/lib/category-defaults-loader.test.cjs
          node --test tests/validation/validate-build.test.cjs
          node --test tests/vendor/version-range-resolution.test.cjs

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: https://volivarii.github.io/actian-ds-docs
          SITE_BASE: /actian-ds-docs
        run: npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deploy must live in the same workflow as the artifact upload — the
  # deploy-pages action reads artifacts from the current workflow run,
  # and workflow_run-triggered deploys can't see upstream artifacts.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
